spring:
  # ── Datasource ─────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB}?serverTimezone=UTC
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ImsasHikariDev
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000

  # ── JPA (sobreescritura dev) ────────────────────────────────────────
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# ── Actuator: detalles visibles en dev ─────────────────────────────
management:
  endpoint:
    health:
      show-details: always

# ── Logging detallado en dev ───────────────────────────────────────
logging:
  level:
    com.imsas: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.flywaydb: DEBUG
