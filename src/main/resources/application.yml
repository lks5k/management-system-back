spring:
  application:
    name: imsas-erp

  # ── Perfil activo por defecto ──────────────────────────────────────
  profiles:
    active: dev

  # ── Serialización JSON ─────────────────────────────────────────────
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: UTC

  # ── JPA / Hibernate ────────────────────────────────────────────────
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 20
        jdbc:
          time_zone: UTC

  # ── Flyway ─────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true

# ── Actuator ───────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# ── JWT ────────────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  api:
    version: v1

# ── Logging base ───────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.imsas: INFO
    org.flywaydb: INFO
